      Required work:
      - Create the initial `safe/` Cargo package and build glue. The library name must be `archive`, and the crate types must include at least `cdylib` and `staticlib` so the build emits `libarchive.so` and `libarchive.a`.
      - Copy `original/libarchive-3.7.2/libarchive/archive.h` and `original/libarchive-3.7.2/libarchive/archive_entry.h` verbatim into `safe/include/`. Later phases may not replace them with generated headers.
      - Derive version values from the oracle instead of hardcoding them. Read `original/libarchive-3.7.2/build/version` and the SOVERSION logic in `original/libarchive-3.7.2/CMakeLists.txt`, and verify the resulting values are `ARCHIVE_VERSION_NUMBER = 3007002`, package version `3.7.2`, and SONAME `libarchive.so.13`.
      - Copy `original/libarchive-3.7.2/build/pkgconfig/libarchive.pc.in` into `safe/pkgconfig/libarchive.pc.in`. Implement `./scripts/render-pkg-config.sh` so it renders `safe/generated/pkgconfig/libarchive.pc` for the current build tree. Its `--check` mode must be read-only and must compare the normalized non-path contract of the rendered safe file against `safe/generated/original_pkgconfig/libarchive.pc`, allowing only `prefix`, `exec_prefix`, `libdir`, and `includedir` to differ.
      - Implement `./scripts/build-original-oracle.sh` so it performs all phase-1 oracle captures in one deterministic write pass and a separate read-only `--check` pass. It must:
        - build the local original Debian package in a temporary working directory and extract the produced `libarchive13t64_*.deb` and `libarchive-dev_*.deb`
        - record the exact defined dynamic symbol list and exact ELF version-info output
        - write `safe/generated/original_package_metadata.json` with at least the package version, Debian revision, multiarch triplet, runtime shared-library install path, development `pkg-config` install path, and produced `.deb` filenames needed by later checks
        - capture the installed original `pkg-config` contract as `safe/generated/original_pkgconfig/libarchive.pc`
        - create a separate out-of-tree Autotools build of `original/libarchive-3.7.2/` using the effective Debian configure contract from `debian/rules`, then copy the resulting `config.h` plus generated suite `list.h` files into `safe/generated/original_c_build/`
        - build and preserve the original-built consumer object set required for later link compatibility
        - derive the `libarchive_test` consumer-source list from the checked-in `original/libarchive-3.7.2/libarchive/test/CMakeLists.txt` target `libarchive_test_SOURCES`, cross-check it against `original/libarchive-3.7.2/Makefile.am` by subtracting `$(libarchive_la_SOURCES)` and ignoring `test.h`, and preserve only consumer objects from `../../test_utils/test_utils.c`, `../../test_utils/test_main.c`, `read_open_memory.c`, and `test_*.c`
        - copy only those preserved consumer objects into `safe/generated/original_link_objects/libarchive_test/`
        - record any non-libarchive link dependencies in `safe/generated/link_compat_manifest.json` as extra libraries, but do not preserve, copy, or later relink any original libarchive implementation object or `archive_static` member
        - compile `original/libarchive-3.7.2/examples/minitar/minitar.c` and `original/libarchive-3.7.2/examples/untar.c` to preserved original-built objects using the captured original headers and `safe/generated/original_pkgconfig/libarchive.pc`, then copy them into `safe/generated/original_link_objects/examples/`
        - write `safe/generated/original_build_contract.json` describing the reusable original C-suite compile contract, including generated-header paths, suite-specific generated `list.h` paths, ordered include roots, and required preprocessor defines
        - require later C-oracle builds to search headers in this order: `safe/include`, then `safe/generated/original_c_build`, then `safe/generated/original_c_build/<suite>/test`, and only then the original internal and test-harness source roots
        - in `--check` mode, validate that every required output already exists, counts still match the fixed expectations, `safe/generated/original_pkgconfig/libarchive.pc` and `safe/generated/original_link_objects/**` are present, the `libarchive_test` snapshot contains only preserved consumer objects from `test_utils/*.c` and `libarchive/test/{read_open_memory.c,test_*.c}`, and no package build, autoreconf, configure, make, or object recompilation is performed
      - Implement `safe/generated/api_inventory.json` as the authoritative inventory for later phases. Derive it from the copied public headers, the live entries in `debian/libarchive13t64.symbols`, and the captured original shared-object export list. Discard `#MISSING:` historical lines, the `* Build-Depends-Package` directive, and any symbol name absent from the captured original export list. Classify each remaining symbol as `header-declared public API`, `deprecated compatibility alias`, or `live symbol-file-only export that still must remain link-compatible`.
      - Implement `safe/config/libarchive_test_phase_groups.json` as a checked-in deterministic classification table for the 604 source-defined `libarchive/test` entries present in `safe/generated/original_c_build/libarchive/test/list.h`. Derive it only from the defining `source_file`; every `DEFINE_TEST(...)` row from the same source file must receive the same `phase_group`; no source file may be split across phases. Apply the exact ordered rules from the phase specification and preserve the fixed counts `foundation = 16`, `write_disk = 73`, `read_mainstream = 147`, and `advanced_formats = 368`.
      - Implement `safe/generated/test_manifest.json` as the authoritative test inventory for later phases. Generate it from `safe/generated/original_c_build/*/test/list.h` as the primary ordered inventory and use source-file scanning only to map each `DEFINE_TEST(...)` name back to its defining source file and fixture references. Each row must record at least `suite`, `define_test`, `source_file`, `suite_order`, `fixture_refs`, and `phase_group`.
      - `safe/tools/gen_test_manifest.py` must fail if any generated suite `list.h` entry is missing from the manifest, if any `libarchive/test` entry is missing from `safe/config/libarchive_test_phase_groups.json`, if the phase-group table contains an unknown or duplicate name, if any `DEFINE_TEST(...)` entry found by source scanning is absent from the generated `list.h` snapshot, or if the fixed counts do not hold. For `tar/test`, `cpio/test`, `cat/test`, and `unzip/test`, the generated `phase_group` value must be the literal `all`.
      - Implement `safe/generated/link_compat_manifest.json` as the authoritative object-link inventory for later phases. It must contain explicit target records for `libarchive_test`, `minitar`, and `untar`, plus the preserved original-built object membership for those targets. For each target, record at least the final link target name, ordered object list, any additional non-libarchive libraries needed at link time, whether the target must be run as part of link-compat verification, and a `run_contract` object when runnable.
      - The `run_contract` schema must be specific enough that `./scripts/check-link-compat.sh` can execute it without guessing. Record the working-directory policy, setup actions, exact argv, named fixture roots, environment overrides, expected exit status for each run, and required post-run assertions. Preserve the fixed runnable-target contracts for `libarchive_test`, `minitar`, and `untar` exactly as specified by the phase file.
      - Add the minimal exported functions needed for smoke builds and ABI inventory checks: `archive_version_number`, `archive_version_string`, `archive_version_details`, `archive_read_new`, `archive_write_new`, `archive_read_disk_new`, `archive_write_disk_new`, `archive_entry_new`, `archive_entry_new2`, `archive_match_new`, `archive_free`, `archive_read_free`, `archive_write_free`, `archive_entry_free`, and `archive_match_free`. Stub behavior is acceptable in this phase if the ABI and panic boundary are correct.
      - Add a panic boundary helper that wraps every exported `extern "C"` entry point with `catch_unwind` and converts unwinds into `ARCHIVE_FATAL`, `NULL`, or another ABI-appropriate failure result instead of unwinding through C.
      - Consume the checked-in oracle artifacts in place and keep `original/` immutable. Later phases must consume the generated phase-1 outputs instead of rescanning the tree, regenerating new inventories, new generated headers, new pkg-config contracts, or new compiler and linker contracts.

      Before yielding, commit all phase work to git. The commit message must begin with `impl_safe_scaffold:`.

