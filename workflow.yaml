      Required work:
      - Add the safe Rust object model for `struct archive`, `struct archive_entry`, ACLs, xattrs, sparse maps, link resolution, and `archive_match`.
      - Add FFI exports for the foundational public APIs, including the live `archive_entry_acl_*` entry-ACL functions and any other foundation-side symbols present in the phase-1 ABI inventory.
      - Add Rust-native tests for the phase-2 surface and wire the C-oracle group through the shared runner.
      - Consume the phase-1 generated artifacts in place. Do not regenerate `config.h`, suite `list.h`, the test manifest, or the API inventory in this phase.
      - Port the `struct archive` magic and state model from `archive_private.h`, including `ARCHIVE_*_MAGIC`, `ARCHIVE_STATE_*`, error number handling, error strings, and `archive_check_magic` semantics. Wrong-state callers must receive the same return-code class and error behavior expected by the original implementation.
      - Port `struct archive_entry` from `archive_entry_private.h` into a safe Rust model with explicit set and unset flags, ACL, xattr, and sparse collections, digest slots, symlink type, encryption flags, and lazy `stat` materialization.
      - Preserve public pointer-return semantics by caching C strings and wide-string views inside the object. Functions such as `archive_entry_pathname()`, `archive_entry_pathname_w()`, and `archive_entry_gname_utf8()` must remain valid until the next mutation, matching the original lifetime behavior.
      - Port `archive_match` with pathname pattern logic, time filters, owner filters, unmatched iteration order, and the same error-message precedence used by the original C implementation.
      - Port the pure utility logic from `archive_pathmatch`, `archive_getdate`, `archive_options`, `archive_pack_dev`, and the shared string and error helpers that underpin option parsing and path and date behavior.
      - Implement the foundational exported surface identified by the phase-1 ABI inventory for the entry, matcher, and string subsystem, including the live `archive_entry_acl_*` family and any deprecated compatibility aliases that still appear in the captured original export list. Do not add historical `#MISSING` families such as `archive_acl_*`, `Ppmd8_*`, or any other names absent from `safe/abi/original_exported_symbols.txt`.
      - Keep unsafe code limited to FFI pointer conversion, `libc::stat` interop, and narrowly scoped raw-buffer handling needed to match the C ABI.

